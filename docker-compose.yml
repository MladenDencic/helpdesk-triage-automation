version: '3.8'

services:
  backend:
    build: ./backend
    container_name: helpdesk_backend_container
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data
    restart: always

  frontend:
    image: nginx:alpine        
    container_name: helpdesk_frontend_container
    ports:
      - "8080:80"              
    volumes:
      - ./frontend:/usr/share/nginx/html 
    restart: always